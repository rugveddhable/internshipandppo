<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>One Day Workshop on AI & SD</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
}

body {
    background: #f6f7f9;
    display: flex;
    justify-content: center;
    padding: 60px 20px;
}

.container {
    width: 420px;
    background: white;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 6px;
}

.subtitle {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 30px;
}

label {
    font-size: 13px;
    color: #444;
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
}

input, select {
    width: 100%;
    padding: 11px;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    margin-bottom: 18px;
    font-size: 14px;
    background: white;
}

input:focus, select:focus {
    outline: none;
    border-color: #2563eb;
}

.payment-box {
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 16px;
    text-align: center;
    margin-bottom: 18px;
    background: #fafafa;
}

.payment-title {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 12px;
    color: #374151;
}

.qr img {
    width: 120px;
    display: block;
    margin: auto;
    border-radius: 6px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: #111827;
    color: white;
    font-size: 14px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
}

button:hover {
    opacity: 0.9;
}

.footer {
    font-size: 12px;
    color: #888;
    margin-top: 15px;
    text-align: center;
    line-height: 1.5;
}
</style>

</head>

<body>

<div class="container">

    <h2>One Day Workshop on System Design with AI</h2>
    <div class="subtitle">Complete payment and submit your application</div>

    <form action="https://formspree.io/f/xeerzerr" method="POST">

        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>

        <label for="tenth">10th Percentage</label>
        <input type="number" id="tenth" name="tenth" min="0" max="100" step="0.01" required>

        <label for="twelfth">12th Percentage</label>
        <input type="number" id="twelfth" name="twelfth" min="0" max="100" step="0.01" required>

        <label for="semester">Previous Semester %</label>
        <input type="number" id="semester" name="semester" min="0" max="100" step="0.01" required>

        <label for="techstack">Preferred Tech Stack</label>
        <select id="techstack" name="techstack" required>
            <option value="">Select Tech Stack</option>
            <option value="Web Development">Web Development</option>
            <option value="AI/ML">AI / ML</option>
            <option value="Flutter">Flutter</option>
            <option value="Cyber Security">Cyber Security</option>
            <option value="Data Science">Data Science</option>
        </select>

        <div class="payment-box">
            <div class="payment-title">Pay ₹499 via UPI</div>
            <div class="qr">
                <img src="/qr.png" alt="UPI QR Code for Payment">
            </div>
        </div>

        <label for="transaction_id">UPI Transaction Number</label>
        <input type="text" id="transaction_id" name="transaction_id" required>

        <button type="submit">Submit Application</button>

    </form>

    <div class="footer">
        After payment, enter the transaction ID to confirm registration.
    </div>

</div>

</body>
</html>
